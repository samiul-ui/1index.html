
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Samiul's Mega Action Animation</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        /* ১. ঝাক্কাস ডার্ক ব্যাকগ্রাউন্ড (অ্যাকশন মুভির মতো) */
        body {
            margin: 0;
            padding: 0;
            background-color: #000; /* একদম কুচকুচে কালো */
            overflow: hidden; /* স্ক্রলবার থাকবে না */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Arial Black', sans-serif;
        }

        /* ২. এনিমেশন কন্টেইনার */
        .action-container {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            /* তুই যেমন চেয়েছিস, এটা অনেক বড় হবে */
            width: 80%; 
            height: 80vh;
        }

        /* ৩. বিশাল বড় মানুষ (Shooter) */
        .shooter {
            font-size: 250px; /* আগের থেকে ৪-৫ গুণ বড়! */
            color: #ffffff; /* সাদা রঙ (দেখা যাওয়ার জন্য) */
            position: absolute;
            left: 10%; /* বাম পাশে থাকবে */
            transform: translateY(-50%);
            /* সামান্য রিকয়েল (Recoil) এনিমেশন - গুলি করার পর কাঁপা */
            animation: recoil 0.5s infinite alternate;
        }

        /* ৪. গুলির শিখা (Muzzle Flash) */
        .muzzle-flash {
            position: absolute;
            left: 35%; /* মানুষের হাতের সামনে */
            font-size: 80px;
            color: #ffeb3b; /* হলুদ */
            opacity: 0;
            filter: blur(5px);
            animation: flash 0.5s infinite;
        }

        /* ৫. গুলি (Bullet Trail) - সামনের দিকে ছুটে যাওয়া */
        .bullet-trail {
            position: absolute;
            left: 38%; /* মানুষের হাতের সামনে থেকে শুরু */
            width: 5px;
            height: 15px;
            background: linear-gradient(to left, #ff3e3e, #ffeb3b); /* লাল থেকে হলুদ */
            border-radius: 5px;
            opacity: 0;
            /* গুলি সামনের দিকে ছুটে যাওয়ার এনিমেশন */
            animation: shoot 1s infinite linear;
        }

        /* ৬. আলাদা আলাদা গুলির জন্য ডাইনামিক ইফেক্ট */
        .bullet-trail:nth-child(2) { animation-delay: 0.3s; }
        .bullet-trail:nth-child(3) { animation-delay: 0.6s; }

        /* --- এনিমেশনগুলো (১ সেকেন্ডের জন্যও স্থির থাকবে না) --- */

        /* মানুষের রিকয়েল এনিমেশন (গুলি করার পর সামান্য কাঁপা) */
        @keyframes recoil {
            0% { transform: translate(0, -50%) rotate(0deg); }
            100% { transform: translate(-5px, -50%) rotate(-1deg); }
        }

        /* গুলির শিখা (দপ দপ করবে) */
        @keyframes flash {
            0% { opacity: 1; transform: scale(1.5) blur(2px); }
            100% { opacity: 0; transform: scale(2) blur(10px); }
        }

        /* গুলি সামনের দিকে ছুটে যাওয়া */
        @keyframes shoot {
            0% {
                transform: translateX(0) scaleX(1);
                opacity: 1;
            }
            10% {
                opacity: 1;
            }
            100% {
                transform: translateX(100vw) scaleX(2); /* স্ক্রিনের বাইরে চলে যাবে */
                opacity: 0;
            }
        }

        /* ৭. মাঝখানের নাম (তোর নামের জন্য) */
        .name-overlay {
            position: absolute;
            z-index: 10;
            color: #ff3e3e; /* তোর লাল রঙ */
            font-size: 80px;
            letter-spacing: 15px;
            text-shadow: 0 0 20px #ff3e3e, 0 0 40px #ff3e3e;
            text-transform: uppercase;
            animation: pulse 2s infinite;
        }

        /* নামের পালস ইফেক্ট */
        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.8; }
            100% { transform: scale(1); opacity: 1; }
        }

    </style>
</head>
<body>

    <div class="action-container">
        <div class="shooter">
            <i class="fas fa-male"></i>
        </div>

        <div class="muzzle-flash">
            <i class="fas fa-fire"></i>
        </div>

        <div class="bullet-trail"></div>
        <div class="bullet-trail"></div>
        <div class="bullet-trail"></div>

        <div class="name-overlay">SAMIUL</div>
    </div>

</body>
</html>
