
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Samiul Fire Walker Animation</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        /* পুরো বডি কালো করার জন্য (তোর ব্যাকগ্রাউন্ডের মতো) */
        body {
            background-color: #000;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* তোর দেওয়া সিএসএস প্রপার্টি এখানে */
        .animation-container {
            display: flex;
            justify-content: center; 
            align-items: center;
            position: relative;      
            margin-top: 50px;       
            margin-bottom: 10px;    
            width: 100%;             
        }

        .shadow-walker {
            font-size: 60px;         
            color: #ffffff;          /* মানুষ দেখা যাওয়ার জন্য সাদা রঙ */
            position: relative;
            animation: walkCycle 1.5s infinite ease-in-out;
        }

        /* আগুনের শিখার স্টাইল */
        .fire-effect {
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 3px;
        }

        .flame {
            width: 8px;
            height: 25px;
            background: linear-gradient(to top, #ff3e3e, #ffeb3b);
            border-radius: 50% 50% 20% 20%;
            opacity: 0;
            animation: ignite 1.2s infinite ease-out;
        }

        /* এনিমেশন কি-ফ্রেমস (অবিরাম চলার জন্য) */
        @keyframes walkCycle {
            0% { transform: translate(-10px, 0px) rotate(0deg); }
            50% { transform: translate(10px, -5px) rotate(2deg); }
            100% { transform: translate(-10px, 0px) rotate(0deg); }
        }

        @keyframes ignite {
            0% { transform: scale(0) translateY(0); opacity: 0; }
            30% { opacity: 1; }
            100% { transform: scale(1.5) translateY(-30px); opacity: 0; }
        }

        /* আগুনের শিখাগুলোর আলাদা টাইমিং */
        .flame:nth-child(1) { animation-delay: 0.1s; }
        .flame:nth-child(2) { animation-delay: 0.3s; }
        .flame:nth-child(3) { animation-delay: 0.5s; }
        .flame:nth-child(4) { animation-delay: 0.7s; }
    </style>
</head>
<body>

    <div class="animation-container">
        <div class="shadow-walker">
            <i class="fas fa-walking"></i>
            
            <div class="fire-effect">
                <span class="flame"></span>
                <span class="flame"></span>
                <span class="flame"></span>
                <span class="flame"></span>
            </div>
        </div>
    </div>

</body>
  </html>
